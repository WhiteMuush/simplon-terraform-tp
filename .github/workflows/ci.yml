name: CI (plan)

# Validation only: fmt + lint + plan. No apply.
# Runs on the feature branch and on PRs targeting main.
on:
  push:
    branches: [ "feat/terraform-resources" ]
  pull_request:
    branches: [ "main" ]

jobs:
  terraform:
    uses: ./.github/workflows/terraform.yml
    with:
      apply: false
    secrets: inherit
    permissions:
      id-token: write
      contents: read
